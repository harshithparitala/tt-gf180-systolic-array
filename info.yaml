# Tiny Tapeout project information
project:
  title:        "3x3 Systolic Array MAC"
  author:       "Paritala Venkata Sai Harshith"
  discord:      "harshith_62881"
  description:  "3x3 parallel hardware architecture for matrix multiplication"
  language:     "Verilog"
  clock_hz:     0

  # Expanded to 2x2 to ensure the 27 multipliers fit in the GF180 routing grid
  tiles: "4x4"

  top_module:  "tt_um_harshith_systolic"

  source_files:
    - "tt_um_harshith_systolic.v"
    - "matrix_mult.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "data_in_0"
  ui[1]: "data_in_1"
  ui[2]: "data_in_2"
  ui[3]: "data_in_3"
  ui[4]: "data_in_4"
  ui[5]: "data_in_5"
  ui[6]: "data_in_6"
  ui[7]: "data_in_7"

  # Outputs
  uo[0]: "data_out_0"
  uo[1]: "data_out_1"
  uo[2]: "data_out_2"
  uo[3]: "data_out_3"
  uo[4]: "data_out_4"
  uo[5]: "data_out_5"
  uo[6]: "data_out_6"
  uo[7]: "data_out_7"

  # Bidirectional pins
  uio[0]: "data_valid_strobe"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6